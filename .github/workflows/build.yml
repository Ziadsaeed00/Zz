name: Build Official Tweak
on: [push]

jobs:
  build:
    runs-on: macos-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
    
    - name: Setup Theos Environment
      run: |
        git clone --recursive https://github.com/theos/theos.git ~/theos
        
    - name: Install ldid Compiler Tool
      run: |
        brew install ldid
        
    - name: Build Tweak via Theos
      run: |
        export THEOS=~/theos
        make OBJDIR=. TARGET=iphone:clang:latest:14.0 ARCHS=arm64 DEBUG=0 FINALPACKAGE=1
        
    - name: Upload Finished Dylib
      uses: actions/upload-artifact@v4
      with:
        name: Ready-Dylib
        path: |
          ./.theos/obj/CodebySMSTweak.dylib
          ./obj/CodebySMSTweak.dylib
          ./CodebySMSTweak.dylib
