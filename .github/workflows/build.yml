name: Build Official Tweak
on: [push]

jobs:
  build:
    runs-on: macos-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
    
    - name: Setup Theos Environment
      run: |
        git clone --recursive https://github.com/theos/theos.git ~/theos
        
    - name: Install ldid Compiler Tool
      run: |
        # تثبيت أداة التوقيع الرسمية داخل السيرفر لإنهاء مشكلة command not found تماماً
        brew install ldid
        
    - name: Build Tweak via Theos
      run: |
        export THEOS=~/theos
        # بناء النسخة النهائية الصافية (Release) وبدون ملفات تصحيح معقدة
        make OBJDIR=. TARGET=iphone:clang:latest:14.0 ARCHS=arm64 DEBUG=0 FINALPACKAGE=1
        
    - name: Upload Finished Dylib
      uses: actions/upload-artifact@v4
      with:
        name: Ready-Dylib
        path: |
          ./*.dylib
          ./.theos/obj/*.dylib
