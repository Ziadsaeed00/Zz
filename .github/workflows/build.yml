name: Build Tweak
on: [push]
jobs:
  build:
    runs-on: macos-13 # استخدام نسخة ماك مستقرة تحتوي على الـ SDK جاهز تلقائياً
    steps:
    - uses: actions/checkout@v4
    - name: Setup Theos
      run: |
        bash -c "$(curl -fsSL https://raw.githubusercontent.com/theos/theos/master/bin/install-theos)"
    - name: Build
      run: |
        make OBJDIR=.
    - name: Upload
      uses: actions/upload-artifact@v4
      with:
        name: CodebySMSTweak
        path: ./*.dylib
