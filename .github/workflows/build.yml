name: Build Tweak
on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Install Theos and Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y fakeroot build-essential perl clang git
        bash -c "$(curl -fsSL https://raw.githubusercontent.com/theos/theos/master/bin/install-theos)"
        echo "THEOS=~/theos" >> $GITHUB_ENV
        echo "~/theos/bin" >> $GITHUB_PATH

    - name: Setup iOS SDK
      run: |
        mkdir -p ~/theos/sdks
        curl -L https://github.com/theos/sdks/raw/master/iPhoneOS14.5.sdk.tar.xz | tar -xf - -C ~/theos/sdks/
        # تأكيد أن الثيوس يرى الـ SDK باسم مبسط
        mv ~/theos/sdks/iPhoneOS14.5.sdk ~/theos/sdks/iPhoneOS.sdk || true

    - name: Build Dylib
      run: |
        make OBJDIR=. TARGET=iphone:clang:latest:14.5
        
    - name: Upload Finished Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: CodebySMSTweak-Final
        path: |
          ./*.dylib
          ./.theos/obj/*.dylib
