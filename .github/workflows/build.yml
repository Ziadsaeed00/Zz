name: Build Tweak
on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Install Theos and Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y fakeroot build-essential perl clang
        bash -c "$(curl -fsSL https://raw.githubusercontent.com/theos/theos/master/bin/install-theos)"
        echo "THEOS=~/theos" >> $GITHUB_ENV
        echo "~/theos/bin" >> $GITHUB_PATH

    - name: Build Dylib
      run: |
        make OBJDIR=.
        
    - name: Upload Finished Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: CodebySMSTweak-Final
        path: |
          ./*.dylib
          ./.theos/obj/*.dylib
